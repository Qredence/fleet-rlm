repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: ["--allow-multiple-documents"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --exit-non-zero-on-fix
      - id: ruff-format

  - repo: local
    hooks:
      - id: frontend-knip-unused-deps
        name: frontend knip unused dependency check
        entry: bash -lc 'cd src/frontend && bun run check:unused'
        language: system
        pass_filenames: false
        files: ^src/frontend/
