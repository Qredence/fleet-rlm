repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        stages: [pre-commit]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.11
    hooks:
      - id: ruff-check
        args:
          - --fix
          - --exit-non-zero-on-fix
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  - repo: local
    hooks:
      - id: ty-check
        name: Type-check backend sources with ty
        entry: uv run ty check src --exclude "src/fleet_rlm/_scaffold/**"
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: backend-fast-tests
        name: Run backend fast test lane
        entry: make test-fast
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-quality-lane
        name: Run frontend contract/type/build lane
        entry: zsh -lc 'cd src/frontend && pnpm install --frozen-lockfile && pnpm run api:check && pnpm run type-check && pnpm run lint:robustness && pnpm run test:unit && pnpm run build'
        language: system
        pass_filenames: false
        stages: [pre-push]
