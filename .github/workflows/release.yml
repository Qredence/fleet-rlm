name: Release to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      normalized_version: ${{ steps.version.outputs.normalized_version }}
      tag_version: ${{ steps.version.outputs.tag_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev --python 3.12

      - name: Normalize and validate version against pyproject.toml
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          NORMALIZED_VERSION="${INPUT_VERSION#v}"
          TAG_VERSION="v${NORMALIZED_VERSION}"

          if [ -z "$NORMALIZED_VERSION" ]; then
            echo "::error::Version input cannot be empty"
            exit 1
          fi

          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")

          if [ "$TOML_VERSION" != "$NORMALIZED_VERSION" ]; then
            echo "::error::Version mismatch: workflow input '$INPUT_VERSION' (normalized '$NORMALIZED_VERSION') != pyproject.toml '$TOML_VERSION'"
            exit 1
          fi

          echo "normalized_version=$NORMALIZED_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          echo "✅ Version $TOML_VERSION matches workflow input '$INPUT_VERSION'"

      - name: Release hygiene checks
        run: |
          uv run python scripts/check_release_hygiene.py
          uv run python scripts/check_release_metadata.py

      - name: Security checks
        run: |
          uvx pip-audit
          uvx bandit -q -r src/fleet_rlm -x tests,src/fleet_rlm/_scaffold -lll

      - name: Lint with Ruff
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type-check with ty
        run: uv run ty check src --exclude "src/fleet_rlm/_scaffold/**"

      - name: Run tests
        run: uv run pytest

      - name: Set up Bun for frontend checks
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.2.10"

      - name: Cache Bun packages
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('src/frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Frontend install
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          bun install --frozen-lockfile

      - name: Install Playwright browser
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          bunx playwright install --with-deps chromium

      - name: Frontend quality gate
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          bun run check

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098 # v7
        with:
          version: "latest"

      - name: Set up Bun for frontend packaging
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.2.10"

      - name: Clean previous builds
        run: rm -rf dist build

      - name: Build distributions
        run: uv build

      - name: Verify packaged frontend assets
        run: uv run python scripts/check_wheel_frontend_sync.py

      - name: Verify distributions
        run: uvx twine check dist/*

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload distributions
        id: artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

  check-pypi-availability:
    name: Check PyPI Package Name
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check if package exists on PyPI
        run: |
          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}\n" https://pypi.org/pypi/fleet-rlm/json || true)
          echo "Status code: $STATUS_CODE"
          if [ "$STATUS_CODE" = "404" ]; then
            echo "✅ Package name 'fleet-rlm' is available on PyPI"
          else
            echo "⚠️  Package 'fleet-rlm' already exists on PyPI. Version conflicts may occur."
          fi

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, check-pypi-availability]
    continue-on-error: true
    environment:
      name: testpypi
      url: https://test.pypi.org/project/fleet-rlm/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test-testpypi:
    name: Smoke Test from TestPyPI
    runs-on: ubuntu-latest
    needs: [publish-testpypi, preflight]
    continue-on-error: true
    if: success() || failure()
    steps:
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Wait for TestPyPI indexing
        run: |
          echo "⏳ Waiting 60 seconds for TestPyPI to index the new version..."
          sleep 60

      - name: Install from TestPyPI
        run: |
          python -m pip install --upgrade pip
          # Retry up to 3 times with exponential backoff
          for i in 1 2 3; do
            echo "Attempt $i to install fleet-rlm==${{ needs.preflight.outputs.normalized_version }}"
            if pip install \
              --index-url https://pypi.org/simple \
              --extra-index-url https://test.pypi.org/simple/ \
              fleet-rlm==${{ needs.preflight.outputs.normalized_version }}; then
              echo "✅ Successfully installed"
              exit 0
            fi
            if [ $i -lt 3 ]; then
              echo "⚠️ Install failed, waiting $((i * 30)) seconds before retry..."
              sleep $((i * 30))
            fi
          done
          echo "❌ Failed to install after 3 attempts"
          exit 1

      - name: Test CLI availability
        run: |
          fleet-rlm --help
          echo "✅ CLI installed and accessible"

      - name: Test Python import
        run: |
          python -c "import fleet_rlm; print(f'✅ Package version: {fleet_rlm.__version__}')"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, smoke-test-testpypi]
    if: always() && needs.build.result == 'success'
    environment:
      name: pypi
      url: https://pypi.org/project/fleet-rlm/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, preflight]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download distributions
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: python-package-distributions
          path: dist/

      - name: Create Git tag (if not already present)
        run: |
          TAG="${{ needs.preflight.outputs.tag_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "✅ Tag $TAG already exists on remote — skipping creation."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Build GitHub release notes from CHANGELOG
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.normalized_version }}
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["RELEASE_VERSION"]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")

          section_header = re.compile(rf"^## \[{re.escape(version)}\] - .*$", re.MULTILINE)
          match = section_header.search(changelog)
          if not match:
              print(f"::error::Could not find CHANGELOG section for version {version}")
              sys.exit(1)

          next_header = re.compile(r"^## \[", re.MULTILINE)
          next_match = next_header.search(changelog, match.end())
          section = changelog[match.start() : next_match.start()].strip() if next_match else changelog[match.start() :].strip()

          body = "\n".join(
              [
                  f"## Release v{version}",
                  "",
                  section,
                  "",
                  "### Installation",
                  "",
                  "```bash",
                  f"pip install fleet-rlm=={version}",
                  "```",
              ]
          ).rstrip() + "\n"

          pathlib.Path("release_notes.md").write_text(body, encoding="utf-8")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag_version }}
          name: Release ${{ needs.preflight.outputs.tag_version }}
          draft: false
          prerelease: false
          files: dist/*
          body_path: release_notes.md
