name: Release to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.1.0 or v0.1.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      normalized_version: ${{ steps.version.outputs.normalized_version }}
      tag_version: ${{ steps.version.outputs.tag_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev --python 3.12

      - name: Normalize and validate version against pyproject.toml
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          NORMALIZED_VERSION="${INPUT_VERSION#v}"
          TAG_VERSION="v${NORMALIZED_VERSION}"

          if [ -z "$NORMALIZED_VERSION" ]; then
            echo "::error::Version input cannot be empty"
            exit 1
          fi

          TOML_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")

          if [ "$TOML_VERSION" != "$NORMALIZED_VERSION" ]; then
            echo "::error::Version mismatch: workflow input '$INPUT_VERSION' (normalized '$NORMALIZED_VERSION') != pyproject.toml '$TOML_VERSION'"
            exit 1
          fi

          echo "normalized_version=$NORMALIZED_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          echo "✅ Version $TOML_VERSION matches workflow input '$INPUT_VERSION'"

      - name: Release hygiene checks
        run: |
          uv run python scripts/validate_release.py hygiene
          uv run python scripts/validate_release.py metadata

      - name: Security checks
        run: |
          # TODO: Remove this ignore once Pygments ships a patched release for
          # GHSA-5239-wwwm-4pmq / CVE-2026-4539.
          uvx pip-audit --ignore-vuln GHSA-5239-wwwm-4pmq
          uvx bandit -q -r src/fleet_rlm -x tests,src/fleet_rlm/scaffold -lll

      - name: Lint with Ruff
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type-check with ty
        run: uv run ty check src --exclude "src/fleet_rlm/scaffold/**"

      - name: Run tests
        env:
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
        run: >
          uv run pytest -q
          --timeout=120
          --timeout-method=thread

      - name: Install pnpm
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.32.1

      - name: Set up Node.js
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "src/frontend/pnpm-lock.yaml"

      - name: Frontend install
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          pnpm install --frozen-lockfile

      - name: Install Playwright browser
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          pnpm dlx playwright install --with-deps chromium

      - name: Frontend quality gate
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          pnpm dlx knip --no-progress || echo "⚠️ Unused dependencies detected - see report above"
          ./node_modules/.bin/vp check
          ./node_modules/.bin/vp test
          ./node_modules/.bin/vp build

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: preflight
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"

      - name: Install pnpm
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.32.1

      - name: Set up Node.js
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "src/frontend/pnpm-lock.yaml"

      - name: Build packaged frontend assets
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          pnpm install --frozen-lockfile
          pnpm run build
          cd ../..
          rm -rf src/fleet_rlm/ui/dist
          mkdir -p src/fleet_rlm/ui
          cp -R src/frontend/dist src/fleet_rlm/ui/dist

      - name: Clean previous builds
        run: rm -rf dist build

      - name: Build distributions
        run: uv build

      - name: Verify packaged frontend assets
        run: uv run python scripts/validate_release.py wheel

      - name: Verify distributions
        run: uvx twine check dist/*

      - name: List artifacts
        run: ls -lh dist/

      - name: Upload distributions
        id: artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 7

  check-pypi-availability:
    name: Check PyPI Package Name
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check if package exists on PyPI
        run: |
          STATUS_CODE=$(curl -sS -o /dev/null -w "%{http_code}\n" https://pypi.org/pypi/fleet-rlm/json || true)
          echo "Status code: $STATUS_CODE"
          if [ "$STATUS_CODE" = "404" ]; then
            echo "✅ Package name 'fleet-rlm' is available on PyPI"
          else
            echo "⚠️  Package 'fleet-rlm' already exists on PyPI. Version conflicts may occur."
          fi

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build, check-pypi-availability]
    environment:
      name: testpypi
      url: https://test.pypi.org/project/fleet-rlm/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test-testpypi:
    name: Smoke Test Built Artifact
    runs-on: ubuntu-latest
    needs: [publish-testpypi, preflight]
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install built wheel
        run: |
          python -m pip install --upgrade pip
          pip install dist/*.whl

      - name: Test Python import
        run: |
          python -c "import fleet_rlm; print(f'✅ Package version: {fleet_rlm.__version__}')"

      - name: Smoke test installed API and packaged UI
        run: |
          SERVER_LOG=$(mktemp)
          ROOT_HEADERS=$(mktemp)
          ROOT_BODY=$(mktemp)

          python -m uvicorn fleet_rlm.api.main:app --host 127.0.0.1 --port 8765 >"$SERVER_LOG" 2>&1 &
          SERVER_PID=$!

          cleanup() {
            kill "$SERVER_PID" 2>/dev/null || true
            wait "$SERVER_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8765/health >/tmp/fleet-health.json; then
              break
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:8765/health >/tmp/fleet-health.json || {
            cat "$SERVER_LOG"
            exit 1
          }

          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/fleet-health.json").read_text(encoding="utf-8"))
          assert payload["ok"] is True
          assert payload["version"]
          print("✅ /health is reachable")
          PY

          curl -fsS -D "$ROOT_HEADERS" http://127.0.0.1:8765/ -o "$ROOT_BODY" || {
            cat "$SERVER_LOG"
            exit 1
          }

          grep -qi "^content-type: text/html" "$ROOT_HEADERS" || {
            cat "$ROOT_HEADERS"
            cat "$ROOT_BODY"
            exit 1
          }
          grep -qi "<!doctype html" "$ROOT_BODY" || {
            cat "$ROOT_BODY"
            exit 1
          }
          echo "✅ Packaged UI is served from the installed distribution"

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, smoke-test-testpypi]
    if: ${{ needs.build.result == 'success' && needs.smoke-test-testpypi.result == 'success' }}
    environment:
      name: pypi
      url: https://pypi.org/project/fleet-rlm/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi, preflight]
    if: ${{ needs.publish-pypi.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/

      - name: Create Git tag (if not already present)
        run: |
          TAG="${{ needs.preflight.outputs.tag_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "✅ Tag $TAG already exists on remote — skipping creation."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Build GitHub release notes from CHANGELOG
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.normalized_version }}
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import sys

          version = os.environ["RELEASE_VERSION"]
          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")

          section_header = re.compile(rf"^## \[{re.escape(version)}\] - .*$", re.MULTILINE)
          match = section_header.search(changelog)
          if not match:
              print(f"::error::Could not find CHANGELOG section for version {version}")
              sys.exit(1)

          next_header = re.compile(r"^## \[", re.MULTILINE)
          next_match = next_header.search(changelog, match.end())
          section = changelog[match.start() : next_match.start()].strip() if next_match else changelog[match.start() :].strip()

          body = "\n".join(
              [
                  f"## Release v{version}",
                  "",
                  section,
                  "",
                  "### Installation",
                  "",
                  "```bash",
                  f"pip install fleet-rlm=={version}",
                  "```",
              ]
          ).rstrip() + "\n"

          pathlib.Path("release_notes.md").write_text(body, encoding="utf-8")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag_version }}
          name: Release ${{ needs.preflight.outputs.tag_version }}
          draft: false
          prerelease: false
          files: dist/*
          body_path: release_notes.md
