name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          fetch-tags: false
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Release hygiene checks
        run: |
          uv run python scripts/check_release_hygiene.py
          uv run python scripts/check_release_metadata.py

      - name: Lint with Ruff
        run: |
          uv run ruff check src tests config/test_responses_endpoint.py
          uv run ruff format --check src tests config/test_responses_endpoint.py

      - name: Type-check with ty
        run: uv run ty check src

      - name: Run tests
        run: uv run pytest

      - name: Set up Bun for frontend checks
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Cache Bun packages
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('src/frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Frontend install
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          bun install --frozen-lockfile

      - name: Install Playwright browser
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          bunx playwright install --with-deps chromium

      - name: Frontend quality gate
        if: ${{ hashFiles('src/frontend/package.json') != '' }}
        run: |
          cd src/frontend
          bun run check
