name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          fetch-tags: false
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Release hygiene checks
        run: |
          uv run python scripts/check_release_hygiene.py
          uv run python scripts/check_release_metadata.py

      - name: Docs quality checks
        run: uv run python scripts/check_docs_quality.py

      - name: Security checks
        run: |
          uvx pip-audit
          uvx bandit -q -r src/fleet_rlm -x tests,src/fleet_rlm/_scaffold -lll

      - name: Lint with Ruff
        run: |
          uv run ruff check src tests config/test_responses_endpoint.py
          uv run ruff format --check src tests config/test_responses_endpoint.py

      - name: Type-check with ty
        run: uv run ty check src --exclude "src/fleet_rlm/_scaffold/**"

  test-unit:
    name: Test Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run unit tests
        run: uv run pytest -q tests/unit -m "not live_llm and not benchmark"

  test-ui:
    name: Test UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run UI tests
        run: uv run pytest -q tests/ui -m "not live_llm and not benchmark"

  test-integration:
    name: Test Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run integration and e2e tests
        run: uv run pytest -q tests/integration tests/e2e -m "not live_llm and not benchmark"

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect frontend workspace
        id: frontend
        shell: bash
        run: |
          if [ -f src/frontend/package.json ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        if: steps.frontend.outputs.enabled == 'true'
        uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.2.10"

      - name: Cache Bun packages
        if: steps.frontend.outputs.enabled == 'true'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('src/frontend/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Frontend install
        if: steps.frontend.outputs.enabled == 'true'
        run: |
          cd src/frontend
          bun install --frozen-lockfile

      - name: Install Playwright browser
        if: steps.frontend.outputs.enabled == 'true'
        run: |
          cd src/frontend
          bunx playwright install --with-deps chromium

      - name: Frontend quality gate
        if: steps.frontend.outputs.enabled == 'true'
        run: |
          cd src/frontend
          bun run check

      - name: Frontend check skipped
        if: steps.frontend.outputs.enabled != 'true'
        run: echo "No src/frontend/package.json found. Skipping frontend checks."
