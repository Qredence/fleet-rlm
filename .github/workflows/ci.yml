name: CI
permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          fetch-tags: false
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Release hygiene checks
        run: |
          uv run python scripts/validate_release.py hygiene
          uv run python scripts/validate_release.py metadata

      - name: Docs quality checks
        run: uv run python scripts/check_docs_quality.py

      - name: AGENTS.md freshness validation
        run: uv run python scripts/check_agents_md_freshness.py

      - name: Security checks
        run: |
          # TODO: Remove this ignore once Pygments ships a patched release for
          # GHSA-5239-wwwm-4pmq / CVE-2026-4539.
          uvx pip-audit --ignore-vuln GHSA-5239-wwwm-4pmq
          uvx bandit -q -r src/fleet_rlm -x tests,src/fleet_rlm/scaffold -lll

      - name: Python unused dependencies (deptry)
        run: uvx deptry . --config pyproject.toml

      - name: Lint with Ruff
        run: |
          uv run ruff check src tests
          uv run ruff format --check src tests

      - name: Type-check with ty
        run: >
          uv run ty check src
          --exclude "src/fleet_rlm/scaffold/**"
          --exclude "src/fleet_rlm/analytics/**"
          --exclude "src/fleet_rlm/daytona_rlm/**"

  test-unit:
    name: Test Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run unit tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
        run: >
          uv run pytest -q tests/unit
          -p pytest_asyncio.plugin
          -p pytest_timeout
          --timeout=120
          --timeout-method=thread
          -m "not live_llm and not benchmark"

  test-ui:
    name: Test UI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run UI tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          MLFLOW_TRACKING_URI: "file:///tmp/mlruns"
        run: >
          uv run pytest -q tests/ui
          -p pytest_asyncio.plugin
          -p pytest_timeout
          --timeout=120
          --timeout-method=thread
          -m "not live_llm and not benchmark"

  test-integration:
    name: Test Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run integration and e2e tests
        run: uv run pytest -q tests/integration tests/e2e -m "not live_llm and not benchmark"

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect frontend workspace
        id: frontend
        shell: bash
        run: |
          if [ -f src/frontend/package.json ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pnpm
        if: steps.frontend.outputs.enabled == 'true'
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10.32.1

      - name: Set up Node.js
        if: steps.frontend.outputs.enabled == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: 'src/frontend/pnpm-lock.yaml'

      - name: Install Vite+ CLI
        if: steps.frontend.outputs.enabled == 'true'
        run: npm install -g vite-plus@0.1.17

      - name: Frontend install
        if: steps.frontend.outputs.enabled == 'true'
        run: |
          cd src/frontend
          vp install

      - name: Install Playwright browser
        if: steps.frontend.outputs.enabled == 'true'
        run: |
          cd src/frontend
          pnpm dlx playwright install --with-deps chromium

      - name: Frontend quality gate
        if: steps.frontend.outputs.enabled == 'true'
        run: |
          cd src/frontend
          pnpm dlx knip --no-progress || echo "⚠️ Unused dependencies detected - see report above"
          ./node_modules/.bin/vp check
          ./node_modules/.bin/vp test
          ./node_modules/.bin/vp build

      - name: Frontend check skipped
        if: steps.frontend.outputs.enabled != 'true'
        run: echo "No src/frontend/package.json found. Skipping frontend checks."
