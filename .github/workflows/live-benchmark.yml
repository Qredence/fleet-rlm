name: Live + Benchmark Tests
permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  live-and-benchmark:
    name: Live + Benchmark
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run live_llm and benchmark tests (opt-in)
        env:
          RLM_LIVE_TESTS: "1"
        run: uv run pytest -q -m "live_llm or benchmark"
