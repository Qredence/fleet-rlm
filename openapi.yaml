      operationId: delete_session_api_v1_sessions__session_id__delete
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          title: Session Id
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/taxonomy:
    get:
      tags:
      - taxonomy
      summary: Get Taxonomy
      operationId: get_taxonomy_api_v1_taxonomy_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items: {}
                type: array
                title: Response Get Taxonomy Api V1 Taxonomy Get
  /api/v1/taxonomy/{path}:
    get:
      tags:
      - taxonomy
      summary: Get Taxonomy By Path
      operationId: get_taxonomy_by_path_api_v1_taxonomy__path__get
      parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
          title: Path
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Taxonomy By Path Api V1 Taxonomy  Path  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/analytics:
    get:
      tags:
      - analytics
      summary: Get Analytics
      operationId: get_analytics_api_v1_analytics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
