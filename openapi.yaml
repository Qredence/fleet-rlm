openapi: 3.1.0
info:
  title: fleet-rlm
  version: 0.4.4
paths:
  /health:
    get:
      tags:
        - health
      summary: Health
      operationId: health_health_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags:
        - health
      summary: Ready
      operationId: ready_ready_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
  /chat:
    post:
      tags:
        - chat
      summary: Chat
      operationId: chat_chat_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /tasks/basic:
    post:
      tags:
        - tasks
      summary: Run Basic
      operationId: run_basic_tasks_basic_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /tasks/architecture:
    post:
      tags:
        - tasks
      summary: Run Architecture
      operationId: run_architecture_tasks_architecture_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /tasks/long-context:
    post:
      tags:
        - tasks
      summary: Run Long Context
      operationId: run_long_context_tasks_long_context_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRequest"
        required: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
  /tasks/check-secret:
    post:
      tags:
        - tasks
      summary: Check Secret
      operationId: check_secret_tasks_check_secret_post
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
  /sessions/state:
    get:
      tags:
        - sessions
      summary: List Session State
      description: Return lightweight summaries of active/restored session state.
      operationId: list_session_state_sessions_state_get
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStateResponse"
components:
  schemas:
    ChatRequest:
      properties:
        message:
          type: string
          title: Message
        docs_path:
          anyOf:
            - type: string
            - type: "null"
          title: Docs Path
        trace:
          type: boolean
          title: Trace
          default: false
      type: object
      required:
        - message
      title: ChatRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        version:
          type: string
          title: Version
          default: 0.4.4
      type: object
      title: HealthResponse
    ReadyResponse:
      properties:
        ready:
          type: boolean
          title: Ready
        planner_configured:
          type: boolean
          title: Planner Configured
      type: object
      required:
        - ready
        - planner_configured
      title: ReadyResponse
    SessionStateResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        sessions:
          items:
            $ref: "#/components/schemas/SessionStateSummary"
          type: array
          title: Sessions
      type: object
      title: SessionStateResponse
    SessionStateSummary:
      properties:
        key:
          type: string
          title: Key
        workspace_id:
          type: string
          title: Workspace Id
        user_id:
          type: string
          title: User Id
        session_id:
          anyOf:
            - type: string
            - type: "null"
          title: Session Id
        history_turns:
          type: integer
          title: History Turns
          default: 0
        document_count:
          type: integer
          title: Document Count
          default: 0
        memory_count:
          type: integer
          title: Memory Count
          default: 0
        log_count:
          type: integer
          title: Log Count
          default: 0
        artifact_count:
          type: integer
          title: Artifact Count
          default: 0
        updated_at:
          anyOf:
            - type: string
            - type: "null"
          title: Updated At
      type: object
      required:
        - key
        - workspace_id
        - user_id
      title: SessionStateSummary
    TaskRequest:
      properties:
        task_type:
          type: string
          enum:
            - basic
            - architecture
            - api_endpoints
            - error_patterns
            - long_context
            - summarize
            - custom_tool
          title: Task Type
        question:
          type: string
          title: Question
          default: ""
        docs_path:
          anyOf:
            - type: string
            - type: "null"
          title: Docs Path
        query:
          type: string
          title: Query
          default: ""
        max_iterations:
          type: integer
          title: Max Iterations
          default: 15
        max_llm_calls:
          type: integer
          title: Max Llm Calls
          default: 30
        timeout:
          type: integer
          title: Timeout
          default: 600
        chars:
          type: integer
          title: Chars
          default: 10000
        verbose:
          type: boolean
          title: Verbose
          default: true
      type: object
      required:
        - task_type
      title: TaskRequest
    TaskResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        result:
          additionalProperties: true
          type: object
          title: Result
        error:
          anyOf:
            - type: string
            - type: "null"
          title: Error
      type: object
      title: TaskResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
