openapi: 3.1.0
info:
  title: fleet-rlm
  version: 0.5.0
paths:
  /health:
    get:
      tags:
      - health
      summary: Health
      description: Report a lightweight server health signal and package version.
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Health status could not be determined.
  /ready:
    get:
      tags:
      - health
      summary: Ready
      description: Report whether critical startup dependencies are ready for requests.
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
        '503':
          description: Readiness evaluation could not complete.
  /api/v1/auth/me:
    get:
      tags:
      - auth
      summary: Get Me
      description: Return the authenticated identity and any admitted control-plane
        IDs.
      operationId: get_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '403':
          description: The authenticated tenant or user is not admitted to Fleet RLM.
        '503':
          description: Authentication or repository services are not configured yet.
      security:
      - HTTPBearer: []
  /api/v1/sessions/state:
    get:
      tags:
      - sessions
      summary: List Session State
      description: Return lightweight summaries of active/restored in-memory session
        state.
      operationId: list_session_state_api_v1_sessions_state_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStateResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Session state is unavailable because server startup is incomplete.
      security:
      - HTTPBearer: []
  /api/v1/sessions:
    get:
      tags:
      - sessions
      summary: List session history
      description: Paginated list of durable session transcripts with search and status
        filters.
      operationId: list_sessions_endpoint_api_v1_sessions_get
      security:
      - HTTPBearer: []
      parameters:
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Full-text search on title
          title: Search
        description: Full-text search on title
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by status (active, archived)
          title: Status
        description: Filter by status (active, archived)
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          description: Page size
          default: 20
          title: Limit
        description: Page size
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset
          default: 0
          title: Offset
        description: Pagination offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}:
    get:
      tags:
      - sessions
      summary: Get session detail
      description: Return session metadata and turn count for a specific session.
      operationId: get_session_detail_api_v1_sessions__session_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the session to inspect.
          title: Session Id
        description: Identifier of the session to inspect.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - sessions
      summary: Archive session
      description: Soft-delete (archive) a session. Returns success when archived,
        404 if not found or not owned.
      operationId: delete_session_endpoint_api_v1_sessions__session_id__delete
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the session to archive.
          title: Session Id
        description: Identifier of the session to archive.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDeleteResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}/turns:
    get:
      tags:
      - sessions
      summary: Get session turns
      description: Paginated turn-by-turn transcript for a session.
      operationId: get_session_turns_api_v1_sessions__session_id__turns_get
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the session whose turns to list.
          title: Session Id
        description: Identifier of the session whose turns to list.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Page size
          default: 50
          title: Limit
        description: Page size
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset
          default: 0
          title: Offset
        description: Pagination offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TurnListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/sessions/{session_id}/export:
    post:
      tags:
      - sessions
      summary: Export session as GEPA dataset
      description: Convert a session's turn history into a JSONL dataset suitable
        for GEPA optimization. Requires a target module slug to determine the column
        mapping.
      operationId: export_session_endpoint_api_v1_sessions__session_id__export_post
      security:
      - HTTPBearer: []
      parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the session to export as a dataset.
          title: Session Id
        description: Identifier of the session to export as a dataset.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionExportRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runtime/settings:
    get:
      tags:
      - runtime
      summary: Get Runtime Settings
      description: Return the effective runtime settings snapshot used by the local
        server.
      operationId: get_runtime_settings_api_v1_runtime_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSettingsSnapshot'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
      security:
      - HTTPBearer: []
    patch:
      tags:
      - runtime
      summary: Patch Runtime Settings
      description: Persist allowed runtime setting changes and hot-apply them in-process.
      operationId: patch_runtime_settings_api_v1_runtime_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSettingsUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSettingsUpdateResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
        '400':
          description: The supplied runtime setting values failed validation.
        '403':
          description: Runtime settings can only be updated when APP_ENV=local.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/runtime/tests/lm:
    post:
      tags:
      - runtime
      summary: Test Lm Connection
      description: Verify that the planner and delegate language-model configuration
        can load.
      operationId: test_lm_connection_api_v1_runtime_tests_lm_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
      security:
      - HTTPBearer: []
  /api/v1/runtime/tests/daytona:
    post:
      tags:
      - runtime
      summary: Test Daytona Connection
      description: Run the Daytona preflight and connectivity check exposed in runtime
        diagnostics.
      operationId: test_daytona_connection_api_v1_runtime_tests_daytona_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
      security:
      - HTTPBearer: []
  /api/v1/runtime/status:
    get:
      tags:
      - runtime
      summary: Get Runtime Status
      description: Return the combined runtime readiness, model, and provider diagnostics
        snapshot.
      operationId: get_runtime_status_api_v1_runtime_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeStatusResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
      security:
      - HTTPBearer: []
  /api/v1/runtime/volume/tree:
    get:
      tags:
      - runtime
      summary: Get Volume Tree
      description: List the runtime volume tree for the active workspace and provider.
      operationId: get_volume_tree_api_v1_runtime_volume_tree_get
      security:
      - HTTPBearer: []
      parameters:
      - name: root_path
        in: query
        required: false
        schema:
          type: string
          description: Directory path to list within the selected runtime volume.
          default: /
          title: Root Path
        description: Directory path to list within the selected runtime volume.
      - name: max_depth
        in: query
        required: false
        schema:
          type: integer
          maximum: 10
          minimum: 1
          description: Maximum directory depth to traverse while building the file
            tree.
          default: 3
          title: Max Depth
        description: Maximum directory depth to traverse while building the file tree.
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - const: daytona
            type: string
          - type: 'null'
          description: Optional runtime volume backend override. Defaults to the active
            sandbox provider.
          title: Provider
        description: Optional runtime volume backend override. Defaults to the active
          sandbox provider.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeTreeResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
        '400':
          description: The requested root path is invalid.
        '502':
          description: The runtime volume provider failed to list the requested path.
        '504':
          description: Volume listing timed out before the backend returned a result.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runtime/volume/file:
    get:
      tags:
      - runtime
      summary: Get Volume File Content
      description: Read a text preview for a single file from the runtime volume.
      operationId: get_volume_file_content_api_v1_runtime_volume_file_get
      security:
      - HTTPBearer: []
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: Absolute or volume-relative file path to preview from the runtime
            volume.
          title: Path
        description: Absolute or volume-relative file path to preview from the runtime
          volume.
      - name: max_bytes
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000000
          minimum: 1
          description: Maximum number of bytes of text content to return in the preview
            response.
          default: 200000
          title: Max Bytes
        description: Maximum number of bytes of text content to return in the preview
          response.
      - name: provider
        in: query
        required: false
        schema:
          anyOf:
          - const: daytona
            type: string
          - type: 'null'
          description: Optional runtime volume backend override. Defaults to the active
            sandbox provider.
          title: Provider
        description: Optional runtime volume backend override. Defaults to the active
          sandbox provider.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeFileContentResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '503':
          description: Runtime services are unavailable because server startup is
            incomplete.
        '400':
          description: The requested file path is invalid or points to a directory.
        '404':
          description: The requested runtime volume file does not exist.
        '502':
          description: The runtime volume provider failed to read the requested file.
        '504':
          description: Volume file reading timed out before the backend returned a
            result.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/optimization/status:
    get:
      tags:
      - optimization
      summary: Get Optimization Status
      description: Return GEPA optimization availability and prerequisites.
      operationId: get_optimization_status_api_v1_optimization_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GEPAStatusResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
      security:
      - HTTPBearer: []
  /api/v1/optimization/modules:
    get:
      tags:
      - optimization
      summary: List Optimization Modules
      description: Return the list of registered optimizable DSPy modules.
      operationId: list_optimization_modules_api_v1_optimization_modules_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GEPAModuleInfo'
                type: array
                title: Response List Optimization Modules Api V1 Optimization Modules
                  Get
        '401':
          description: Authentication is required or the provided token is invalid.
      security:
      - HTTPBearer: []
  /api/v1/optimization/run:
    post:
      tags:
      - optimization
      summary: Run Optimization
      description: Trigger a GEPA prompt optimization run.
      operationId: run_optimization_api_v1_optimization_run_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GEPAOptimizationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GEPAOptimizationResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '400':
          description: Invalid optimization parameters.
        '503':
          description: GEPA optimization is unavailable in this environment.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/optimization/runs:
    post:
      tags:
      - optimization
      summary: Create Optimization Run
      description: 'Create a non-blocking GEPA optimization run.


        Returns immediately with the run_id.  The optimization executes as a

        background task.  Poll ``GET /runs/{run_id}`` for progress and results.'
      operationId: create_optimization_run_api_v1_optimization_runs_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GEPAOptimizationRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRunCreatedResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '400':
          description: Invalid optimization parameters.
        '503':
          description: GEPA optimization is unavailable in this environment.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - optimization
      summary: List Runs
      description: List optimization runs, most recent first.
      operationId: list_runs_api_v1_optimization_runs_get
      security:
      - HTTPBearer: []
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by status: running, completed, failed'
          title: Status
        description: 'Filter by status: running, completed, failed'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Maximum number of runs to return.
          default: 50
          title: Limit
        description: Maximum number of runs to return.
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset into the run list.
          default: 0
          title: Offset
        description: Pagination offset into the run list.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OptimizationRunResponse'
                title: Response List Runs Api V1 Optimization Runs Get
        '401':
          description: Authentication is required or the provided token is invalid.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/optimization/transcript-datasets:
    post:
      tags:
      - optimization
      summary: Create Dataset From Transcript
      description: Convert transcript turns into a GEPA dataset.
      operationId: create_dataset_from_transcript_api_v1_optimization_transcript_datasets_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranscriptDatasetRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '400':
          description: Invalid transcript dataset payload.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
  /api/v1/optimization/runs/compare:
    get:
      tags:
      - optimization
      summary: Compare Runs
      description: Compare prompt diffs and scores across optimization runs.
      operationId: compare_runs_api_v1_optimization_runs_compare_get
      security:
      - HTTPBearer: []
      parameters:
      - name: run_ids
        in: query
        required: true
        schema:
          type: string
          description: Comma-separated run IDs to compare (max 5).
          title: Run Ids
        description: Comma-separated run IDs to compare (max 5).
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunComparisonResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '400':
          description: Invalid run_ids parameter.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/optimization/runs/{run_id}:
    get:
      tags:
      - optimization
      summary: Get Run
      description: Get a single optimization run by ID.
      operationId: get_run_api_v1_optimization_runs__run_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the optimization run to fetch.
          title: Run Id
        description: Identifier of the optimization run to fetch.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptimizationRunResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '404':
          description: Run not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/optimization/datasets:
    post:
      tags:
      - optimization
      summary: Upload Dataset
      description: Upload and register a dataset file (.json or .jsonl).
      operationId: upload_dataset_api_v1_optimization_datasets_post
      security:
      - HTTPBearer: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_upload_dataset_api_v1_optimization_datasets_post'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '400':
          description: Invalid dataset file.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - optimization
      summary: List Datasets Endpoint
      description: List registered datasets with optional module filter.
      operationId: list_datasets_endpoint_api_v1_optimization_datasets_get
      security:
      - HTTPBearer: []
      parameters:
      - name: module_slug
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by module slug
          title: Module Slug
        description: Filter by module slug
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Maximum number of datasets to return.
          default: 50
          title: Limit
        description: Maximum number of datasets to return.
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset into the dataset list.
          default: 0
          title: Offset
        description: Pagination offset into the dataset list.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetListResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/optimization/datasets/{dataset_id}:
    get:
      tags:
      - optimization
      summary: Get Dataset Detail
      description: Return dataset metadata with the first 10 rows as preview.
      operationId: get_dataset_detail_api_v1_optimization_datasets__dataset_id__get
      security:
      - HTTPBearer: []
      parameters:
      - name: dataset_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the dataset to inspect.
          title: Dataset Id
        description: Identifier of the dataset to inspect.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatasetDetailResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '404':
          description: Dataset not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/optimization/runs/{run_id}/results:
    get:
      tags:
      - optimization
      summary: Get Run Results
      description: Return per-example evaluation results for an optimization run.
      operationId: get_run_results_api_v1_optimization_runs__run_id__results_get
      security:
      - HTTPBearer: []
      parameters:
      - name: run_id
        in: path
        required: true
        schema:
          type: string
          description: Identifier of the optimization run whose results to list.
          title: Run Id
        description: Identifier of the optimization run whose results to list.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Maximum number of evaluation rows to return.
          default: 100
          title: Limit
        description: Maximum number of evaluation rows to return.
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Pagination offset into the evaluation results.
          default: 0
          title: Offset
        description: Pagination offset into the evaluation results.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResultsResponse'
        '401':
          description: Authentication is required or the provided token is invalid.
        '404':
          description: Run not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/traces/feedback:
    post:
      tags:
      - traces
      summary: Create Trace Feedback
      description: Record human feedback and optional ground truth for an MLflow trace.
      operationId: create_trace_feedback_api_v1_traces_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceFeedbackRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceFeedbackResponse'
        '400':
          description: The feedback request did not include a valid trace identifier.
        '401':
          description: Authentication is required or the provided token is invalid.
        '403':
          description: The authenticated user is not allowed to annotate this trace.
        '404':
          description: No MLflow trace matched the provided identifier.
        '503':
          description: MLflow feedback services are unavailable or misconfigured.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - HTTPBearer: []
