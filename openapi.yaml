          description: Total number of turns in this session.
        created_at:
          type: string
          title: Created At
          description: ISO-8601 creation timestamp.
        updated_at:
          type: string
          title: Updated At
          description: ISO-8601 last-update timestamp.
      type: object
      required:
      - id
      - title
      - status
      - turn_count
      - created_at
      - updated_at
      title: SessionDetailResponse
      description: Full session detail with turn count.
    SessionExportRequest:
      properties:
        module_slug:
          type: string
          title: Module Slug
          description: Target GEPA module slug whose dataset keys determine the export
            column mapping.
      type: object
      required:
      - module_slug
      title: SessionExportRequest
      description: Request body for exporting a session's turns as a GEPA training
        dataset.
    SessionListItem:
      properties:
        id:
          type: string
          title: Id
          description: Durable session identifier.
        title:
          type: string
          title: Title
          description: Human-readable session title.
        status:
          type: string
          title: Status
          description: Session status (active, archived).
        model_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Name
          description: Model used in session.
        external_session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: External Session Id
          description: Canonical runtime session identifier.
        created_at:
          type: string
          title: Created At
          description: ISO-8601 creation timestamp.
        updated_at:
          type: string
          title: Updated At
          description: ISO-8601 last-update timestamp.
      type: object
      required:
      - id
      - title
      - status
      - created_at
      - updated_at
      title: SessionListItem
      description: Lightweight session summary for list views.
    SessionListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/SessionListItem'
          type: array
          title: Items
          description: Session list items.
        total:
          type: integer
          title: Total
          description: Total matching sessions.
        offset:
          type: integer
          title: Offset
          description: Current pagination offset.
        limit:
          type: integer
          title: Limit
          description: Current page size.
        has_more:
          type: boolean
          title: Has More
          description: Whether more results exist beyond this page.
      type: object
      required:
      - items
      - total
      - offset
      - limit
      - has_more
      title: SessionListResponse
      description: Paginated session list.
    SessionStateResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          description: Whether the session-state query completed successfully.
          default: true
        sessions:
          items:
            $ref: '#/components/schemas/SessionStateSummary'
          type: array
          title: Sessions
          description: Active or restored session summaries currently known to the
            server.
      type: object
      title: SessionStateResponse
      description: Response body for the session-state summary endpoint.
    SessionStateSummary:
      properties:
        key:
          type: string
          title: Key
          description: Stable in-memory session key used by the server.
        workspace_id:
          type: string
          title: Workspace Id
          description: Workspace identifier owning the session.
        user_id:
          type: string
          title: User Id
          description: User identifier owning the session.
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
          description: Optional explicit session identifier when one has been assigned.
        history_turns:
          type: integer
          title: History Turns
          description: Number of conversation turns currently stored in session history.
          default: 0
        document_count:
          type: integer
          title: Document Count
          description: Number of loaded document entries attached to the session state.
          default: 0
        memory_count:
          type: integer
          title: Memory Count
          description: Number of persisted memory items in the session manifest.
          default: 0
        log_count:
          type: integer
          title: Log Count
          description: Number of execution log entries in the session manifest.
          default: 0
        artifact_count:
          type: integer
          title: Artifact Count
          description: Number of artifacts currently tracked in the session manifest.
          default: 0
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
          description: Last updated timestamp recorded in the session manifest, when
            available.
      type: object
      required:
      - key
      - workspace_id
      - user_id
      title: SessionStateSummary
      description: Lightweight summary of a persisted or active chat session.
    TraceFeedbackRequest:
      properties:
        trace_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Trace Id
          description: Resolved MLflow trace identifier when the client already knows
            it.
        client_request_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Request Id
          description: Client request identifier used to resolve the trace when trace_id
            is absent.
        is_correct:
          type: boolean
          title: Is Correct
          description: Whether the model output was considered correct.
        comment:
          anyOf:
          - type: string
          - type: 'null'
          title: Comment
          description: Optional free-form reviewer comment explaining the feedback.
        expected_response:
          anyOf:
          - type: string
          - type: 'null'
          title: Expected Response
          description: Optional ground-truth response or correction to log alongside
            the feedback.
      type: object
      required:
      - is_correct
      title: TraceFeedbackRequest
      description: Feedback payload for annotating an MLflow trace.
    TraceFeedbackResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          description: Whether the feedback request completed successfully.
          default: true
        trace_id:
          type: string
          title: Trace Id
          description: Resolved MLflow trace identifier that received the feedback.
        client_request_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Request Id
          description: Resolved client request identifier associated with the trace,
            when available.
        feedback_logged:
          type: boolean
          title: Feedback Logged
          description: Whether binary/correctness feedback was successfully logged.
          default: true
        expectation_logged:
          type: boolean
          title: Expectation Logged
          description: Whether an expected-response correction was successfully logged.
          default: false
      type: object
      required:
      - trace_id
      title: TraceFeedbackResponse
      description: Result payload after MLflow feedback has been recorded.
    TranscriptDatasetRequest:
      properties:
        module_slug:
          type: string
          title: Module Slug
          description: Target GEPA module slug whose dataset keys determine row mapping.
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          description: Optional human-readable transcript title used for dataset naming.
        turns:
          items:
            $ref: '#/components/schemas/TranscriptTurnInput'
          type: array
          title: Turns
          description: Transcript turns to convert into dataset rows.
      type: object
      required:
      - module_slug
      - turns
      title: TranscriptDatasetRequest
      description: Request body for converting transcript turns into a GEPA dataset.
    TranscriptTurnInput:
      properties:
        user_message:
          anyOf:
          - type: string
          - type: 'null'
          title: User Message
          description: User prompt/content for the turn.
        assistant_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Assistant Message
          description: Assistant response/content for the turn.
      type: object
      title: TranscriptTurnInput
      description: Single transcript turn used to build a GEPA dataset.
    TurnItem:
      properties:
        id:
          type: string
          title: Id
          description: Durable turn identifier.
        turn_index:
          type: integer
          title: Turn Index
          description: Zero-based turn position.
        user_message:
          type: string
          title: User Message
          description: User message text.
        assistant_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Assistant Message
          description: Assistant response text.
        created_at:
          type: string
          title: Created At
          description: ISO-8601 creation timestamp.
      type: object
      required:
      - id
      - turn_index
      - user_message
      - created_at
      title: TurnItem
      description: Single turn in a session transcript.
    TurnListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/TurnItem'
          type: array
          title: Items
          description: Turn list items.
        total:
          type: integer
          title: Total
          description: Total turns in session.
        offset:
          type: integer
          title: Offset
          description: Current pagination offset.
        limit:
          type: integer
          title: Limit
          description: Current page size.
        has_more:
          type: boolean
          title: Has More
          description: Whether more turns exist beyond this page.
      type: object
      required:
      - items
      - total
      - offset
      - limit
      - has_more
      title: TurnListResponse
      description: Paginated turn list.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
          description: Location path identifying where the validation error occurred.
        msg:
          type: string
          title: Message
          description: Human-readable validation failure message.
        type:
          type: string
          title: Error Type
          description: Pydantic validation error type identifier.
        input:
          title: Input
          description: Input value that failed validation, when available.
        ctx:
          type: object
          title: Context
          description: Optional structured validation context for templated error
            messages.
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VolumeFileContentResponse:
      properties:
        provider:
          type: string
          const: daytona
          title: Provider
          description: Runtime volume backend used to satisfy the request.
        path:
          type: string
          title: Path
          description: Normalized file path used for the preview request.
        mime:
          type: string
          title: Mime
          description: Detected MIME type for the returned content.
        size:
          type: integer
          title: Size
          description: File size in bytes reported by the provider.
        content:
          type: string
          title: Content
          description: UTF-8 text preview returned for the requested file.
        truncated:
          type: boolean
          title: Truncated
          description: Whether the returned file content was truncated to respect
            max_bytes.
          default: false
      type: object
      required:
      - provider
      - path
      - mime
      - size
      - content
      title: VolumeFileContentResponse
      description: Response for runtime volume file-content preview endpoint.
    VolumeTreeNode:
      properties:
        id:
          type: string
          title: Id
          description: Stable node identifier used by the frontend tree view.
        name:
          type: string
          title: Name
          description: Display name for the file-system node.
        path:
          type: string
          title: Path
          description: Absolute path for the file-system node within the runtime volume.
        type:
          type: string
          enum:
          - volume
          - directory
          - file
          title: Type
          description: Kind of file-system node represented by this entry.
        children:
          items:
            $ref: '#/components/schemas/VolumeTreeNode'
          type: array
          title: Children
          description: Child nodes for directory or volume entries.
        size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Size
          description: File size in bytes when the provider reports one.
        modified_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Modified At
          description: Last modified timestamp when the provider reports one.
      type: object
      required:
      - id
      - name
      - path
      - type
      title: VolumeTreeNode
      description: A single node in the volume file tree.
    VolumeTreeResponse:
      properties:
        provider:
          type: string
          const: daytona
          title: Provider
          description: Runtime volume backend used to satisfy the request.
        volume_name:
          type: string
          title: Volume Name
          description: Resolved volume name used for the listing request.
        root_path:
          type: string
          title: Root Path
          description: Normalized root path used for the listing request.
        nodes:
          items:
            $ref: '#/components/schemas/VolumeTreeNode'
          type: array
          title: Nodes
          description: Tree nodes rooted at the requested path.
        total_files:
          type: integer
          title: Total Files
          description: Total file count returned in the current response payload.
          default: 0
        total_dirs:
          type: integer
          title: Total Dirs
          description: Total directory count returned in the current response payload.
          default: 0
        truncated:
          type: boolean
          title: Truncated
          description: Whether the provider truncated the tree because of depth or
            payload limits.
          default: false
      type: object
      required:
      - provider
      - volume_name
      - root_path
      - nodes
      title: VolumeTreeResponse
      description: Response for the volume tree listing endpoint.
  securitySchemes:
    HTTPBearer:
      type: http
      description: Bearer token used when HTTP authentication is enabled. When auth
        is optional, requests without a token fall back to the configured default
        server identity.
      scheme: bearer
      bearerFormat: JWT
