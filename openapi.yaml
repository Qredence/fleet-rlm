          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeStatusResponse'
  /api/v1/sandbox:
    get:
      tags:
      - sandbox
      summary: Get Sandbox
      operationId: get_sandbox_api_v1_sandbox_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Sandbox Api V1 Sandbox Get
  /api/v1/sandbox/file:
    get:
      tags:
      - sandbox
      summary: Get Sandbox File
      operationId: get_sandbox_file_api_v1_sandbox_file_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Sandbox File Api V1 Sandbox File Get
components:
  schemas:
    ChatRequest:
      properties:
        message:
          type: string
          title: Message
        docs_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Docs Path
        trace:
          type: boolean
          title: Trace
          default: false
      type: object
      required:
      - message
      title: ChatRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        version:
          type: string
          title: Version
          default: 0.4.9
      type: object
      title: HealthResponse
    ReadyResponse:
      properties:
        ready:
          type: boolean
          title: Ready
        planner_configured:
          type: boolean
          title: Planner Configured
        planner:
          type: string
          enum:
          - ready
          - missing
          title: Planner
        database:
          type: string
          enum:
          - ready
          - missing
          - disabled
          - degraded
          title: Database
        database_required:
          type: boolean
          title: Database Required
        sandbox_provider:
          type: string
          title: Sandbox Provider
      type: object
      required:
      - ready
      - planner_configured
      - planner
      - database
      - database_required
      - sandbox_provider
      title: ReadyResponse
    RuntimeConnectivityTestResponse:
      properties:
        kind:
          type: string
          enum:
          - modal
          - lm
          title: Kind
        ok:
          type: boolean
          title: Ok
        preflight_ok:
          type: boolean
          title: Preflight Ok
        checked_at:
          type: string
          title: Checked At
        checks:
          additionalProperties: true
          type: object
          title: Checks
        guidance:
          items:
            type: string
          type: array
          title: Guidance
        latency_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Latency Ms
        output_preview:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Preview
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - kind
      - ok
      - preflight_ok
      - checked_at
      title: RuntimeConnectivityTestResponse
    RuntimeSettingsSnapshot:
      properties:
        env_path:
          type: string
          title: Env Path
        keys:
          items:
            type: string
          type: array
          title: Keys
        values:
          additionalProperties:
            type: string
          type: object
          title: Values
        masked_values:
          additionalProperties:
            type: string
          type: object
          title: Masked Values
      type: object
      required:
      - env_path
      title: RuntimeSettingsSnapshot
    RuntimeSettingsUpdateRequest:
      properties:
        updates:
          additionalProperties: true
          type: object
          title: Updates
      type: object
      title: RuntimeSettingsUpdateRequest
    RuntimeSettingsUpdateResponse:
      properties:
        updated:
          items:
            type: string
          type: array
          title: Updated
        env_path:
          type: string
          title: Env Path
      type: object
      required:
      - env_path
      title: RuntimeSettingsUpdateResponse
    RuntimeStatusResponse:
      properties:
        app_env:
          type: string
          title: App Env
        write_enabled:
          type: boolean
          title: Write Enabled
        ready:
          type: boolean
          title: Ready
        llm:
          additionalProperties: true
          type: object
          title: Llm
        modal:
          additionalProperties: true
          type: object
          title: Modal
        tests:
          $ref: '#/components/schemas/RuntimeTestCache'
        guidance:
          items:
            type: string
          type: array
          title: Guidance
      type: object
      required:
      - app_env
      - write_enabled
      - ready
      - tests
      title: RuntimeStatusResponse
    RuntimeTestCache:
      properties:
        modal:
          anyOf:
          - $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
          - type: 'null'
        lm:
          anyOf:
          - $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
          - type: 'null'
      type: object
      title: RuntimeTestCache
    SessionCreate:
      properties:
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
          default: New Session
      type: object
      title: SessionCreate
      description: Schema for creating a new Session.
    SessionResponse:
      properties:
        id:
          type: string
          title: Id
        title:
          type: string
          title: Title
        status:
          type: string
          title: Status
        createdAt:
          type: string
          format: date-time
          title: Createdat
      type: object
      required:
      - id
      - title
      - status
      - createdAt
      title: SessionResponse
      description: Schema for returning a Session to the frontend.
    SessionStateResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        sessions:
          items:
            $ref: '#/components/schemas/SessionStateSummary'
          type: array
          title: Sessions
      type: object
      title: SessionStateResponse
    SessionStateSummary:
      properties:
        key:
          type: string
          title: Key
        workspace_id:
          type: string
          title: Workspace Id
        user_id:
          type: string
          title: User Id
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
        history_turns:
          type: integer
          title: History Turns
          default: 0
        document_count:
          type: integer
          title: Document Count
          default: 0
        memory_count:
          type: integer
          title: Memory Count
          default: 0
        log_count:
          type: integer
          title: Log Count
          default: 0
        artifact_count:
          type: integer
          title: Artifact Count
          default: 0
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
      type: object
      required:
      - key
      - workspace_id
      - user_id
      title: SessionStateSummary
    SessionUpdate:
      properties:
        title:
          anyOf:
          - type: string
          - type: 'null'
          title: Title
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      type: object
      title: SessionUpdate
      description: Schema for updating an existing Session.
    TaskCreate:
      properties:
        objective:
          type: string
          title: Objective
        sessionId:
          anyOf:
          - type: string
          - type: 'null'
          title: Sessionid
      type: object
      required:
      - objective
      title: TaskCreate
      description: Schema for creating a new Task.
    TaskResponse:
      properties:
        id:
          type: string
          title: Id
        sessionId:
          anyOf:
          - type: string
          - type: 'null'
          title: Sessionid
        objective:
          type: string
          title: Objective
        status:
          type: string
          title: Status
        result:
          anyOf:
          - type: string
          - type: 'null'
          title: Result
        createdAt:
          type: string
          format: date-time
          title: Createdat
        updatedAt:
          type: string
          format: date-time
          title: Updatedat
      type: object
      required:
      - id
      - sessionId
      - objective
      - status
      - result
      - createdAt
      - updatedAt
      title: TaskResponse
      description: Schema for returning a Task to the frontend.
    TaskUpdate:
      properties:
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
        result:
          anyOf:
          - type: string
          - type: 'null'
          title: Result
      type: object
      title: TaskUpdate
      description: Schema for updating an existing Task.
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
