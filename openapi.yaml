openapi: 3.1.0
info:
  title: fleet-rlm
  version: 0.4.97
paths:
  /health:
    get:
      tags:
      - health
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /ready:
    get:
      tags:
      - health
      summary: Ready
      operationId: ready_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /api/v1/auth/me:
    get:
      tags:
      - auth
      summary: Get Me
      operationId: get_me_api_v1_auth_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMeResponse'
  /api/v1/sessions/state:
    get:
      tags:
      - sessions
      summary: List Session State
      description: Return lightweight summaries of active/restored in-memory session
        state.
      operationId: list_session_state_api_v1_sessions_state_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStateResponse'
  /api/v1/runtime/settings:
    get:
      tags:
      - runtime
      summary: Get Runtime Settings
      operationId: get_runtime_settings_api_v1_runtime_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSettingsSnapshot'
    patch:
      tags:
      - runtime
      summary: Patch Runtime Settings
      operationId: patch_runtime_settings_api_v1_runtime_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSettingsUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSettingsUpdateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runtime/tests/modal:
    post:
      tags:
      - runtime
      summary: Test Modal Connection
      operationId: test_modal_connection_api_v1_runtime_tests_modal_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
  /api/v1/runtime/tests/lm:
    post:
      tags:
      - runtime
      summary: Test Lm Connection
      operationId: test_lm_connection_api_v1_runtime_tests_lm_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
  /api/v1/runtime/status:
    get:
      tags:
      - runtime
      summary: Get Runtime Status
      operationId: get_runtime_status_api_v1_runtime_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeStatusResponse'
  /api/v1/runtime/volume/tree:
    get:
      tags:
      - runtime
      summary: Get Volume Tree
      description: List the file tree of the configured Modal Volume.
      operationId: get_volume_tree_api_v1_runtime_volume_tree_get
      parameters:
      - name: root_path
        in: query
        required: false
        schema:
          type: string
          default: /
          title: Root Path
      - name: max_depth
        in: query
        required: false
        schema:
          type: integer
          maximum: 10
          minimum: 1
          default: 3
          title: Max Depth
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeTreeResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runtime/volume/file:
    get:
      tags:
      - runtime
      summary: Get Volume File Content
      description: Read a volume file as UTF-8 text for frontend preview.
      operationId: get_volume_file_content_api_v1_runtime_volume_file_get
      parameters:
      - name: path
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          title: Path
      - name: max_bytes
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000000
          minimum: 1
          default: 200000
          title: Max Bytes
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VolumeFileContentResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/traces/feedback:
    post:
      tags:
      - traces
      summary: Create Trace Feedback
      description: Record human feedback and optional ground truth for an MLflow trace.
      operationId: create_trace_feedback_api_v1_traces_feedback_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TraceFeedbackRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceFeedbackResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    AuthMeResponse:
      properties:
        tenant_claim:
          type: string
          title: Tenant Claim
        user_claim:
          type: string
          title: User Claim
        email:
          anyOf:
          - type: string
          - type: 'null'
          title: Email
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        tenant_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Tenant Id
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
      type: object
      required:
      - tenant_claim
      - user_claim
      title: AuthMeResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        version:
          type: string
          title: Version
          default: 0.4.97
      type: object
      title: HealthResponse
    ReadyResponse:
      properties:
        ready:
          type: boolean
          title: Ready
        planner_configured:
          type: boolean
          title: Planner Configured
        planner:
          type: string
          enum:
          - ready
          - missing
          title: Planner
        database:
          type: string
          enum:
          - ready
          - missing
          - disabled
          - degraded
          title: Database
        database_required:
          type: boolean
          title: Database Required
        sandbox_provider:
          type: string
          title: Sandbox Provider
      type: object
      required:
      - ready
      - planner_configured
      - planner
      - database
      - database_required
      - sandbox_provider
      title: ReadyResponse
    RuntimeActiveModels:
      properties:
        planner:
          type: string
          title: Planner
          default: ''
        delegate:
          type: string
          title: Delegate
          default: ''
        delegate_small:
          type: string
          title: Delegate Small
          default: ''
      type: object
      title: RuntimeActiveModels
    RuntimeConnectivityTestResponse:
      properties:
        kind:
          type: string
          enum:
          - modal
          - lm
          title: Kind
        ok:
          type: boolean
          title: Ok
        preflight_ok:
          type: boolean
          title: Preflight Ok
        checked_at:
          type: string
          title: Checked At
        checks:
          additionalProperties: true
          type: object
          title: Checks
        guidance:
          items:
            type: string
          type: array
          title: Guidance
        latency_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Latency Ms
        output_preview:
          anyOf:
          - type: string
          - type: 'null'
          title: Output Preview
        error:
          anyOf:
          - type: string
          - type: 'null'
          title: Error
      type: object
      required:
      - kind
      - ok
      - preflight_ok
      - checked_at
      title: RuntimeConnectivityTestResponse
    RuntimeSettingsSnapshot:
      properties:
        env_path:
          type: string
          title: Env Path
        keys:
          items:
            type: string
          type: array
          title: Keys
        values:
          additionalProperties:
            type: string
          type: object
          title: Values
        masked_values:
          additionalProperties:
            type: string
          type: object
          title: Masked Values
      type: object
      required:
      - env_path
      title: RuntimeSettingsSnapshot
    RuntimeSettingsUpdateRequest:
      properties:
        updates:
          additionalProperties: true
          type: object
          title: Updates
      type: object
      title: RuntimeSettingsUpdateRequest
    RuntimeSettingsUpdateResponse:
      properties:
        updated:
          items:
            type: string
          type: array
          title: Updated
        env_path:
          type: string
          title: Env Path
      type: object
      required:
      - env_path
      title: RuntimeSettingsUpdateResponse
    RuntimeStatusResponse:
      properties:
        app_env:
          type: string
          title: App Env
        write_enabled:
          type: boolean
          title: Write Enabled
        ready:
          type: boolean
          title: Ready
        active_models:
          $ref: '#/components/schemas/RuntimeActiveModels'
        llm:
          additionalProperties: true
          type: object
          title: Llm
        modal:
          additionalProperties: true
          type: object
          title: Modal
        tests:
          $ref: '#/components/schemas/RuntimeTestCache'
        guidance:
          items:
            type: string
          type: array
          title: Guidance
      type: object
      required:
      - app_env
      - write_enabled
      - ready
      - active_models
      - tests
      title: RuntimeStatusResponse
    RuntimeTestCache:
      properties:
        modal:
          anyOf:
          - $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
          - type: 'null'
        lm:
          anyOf:
          - $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
          - type: 'null'
      type: object
      title: RuntimeTestCache
    SessionStateResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        sessions:
          items:
            $ref: '#/components/schemas/SessionStateSummary'
          type: array
          title: Sessions
      type: object
      title: SessionStateResponse
    SessionStateSummary:
      properties:
        key:
          type: string
          title: Key
        workspace_id:
          type: string
          title: Workspace Id
        user_id:
          type: string
          title: User Id
        session_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Session Id
        history_turns:
          type: integer
          title: History Turns
          default: 0
        document_count:
          type: integer
          title: Document Count
          default: 0
        memory_count:
          type: integer
          title: Memory Count
          default: 0
        log_count:
          type: integer
          title: Log Count
          default: 0
        artifact_count:
          type: integer
          title: Artifact Count
          default: 0
        updated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Updated At
      type: object
      required:
      - key
      - workspace_id
      - user_id
      title: SessionStateSummary
    TraceFeedbackRequest:
      properties:
        trace_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Trace Id
        client_request_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Request Id
        is_correct:
          type: boolean
          title: Is Correct
        comment:
          anyOf:
          - type: string
          - type: 'null'
          title: Comment
        expected_response:
          anyOf:
          - type: string
          - type: 'null'
          title: Expected Response
      type: object
      required:
      - is_correct
      title: TraceFeedbackRequest
    TraceFeedbackResponse:
      properties:
        ok:
          type: boolean
          title: Ok
          default: true
        trace_id:
          type: string
          title: Trace Id
        client_request_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Client Request Id
        feedback_logged:
          type: boolean
          title: Feedback Logged
          default: true
        expectation_logged:
          type: boolean
          title: Expectation Logged
          default: false
      type: object
      required:
      - trace_id
      title: TraceFeedbackResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VolumeFileContentResponse:
      properties:
        path:
          type: string
          title: Path
        mime:
          type: string
          title: Mime
        size:
          type: integer
          title: Size
        content:
          type: string
          title: Content
        truncated:
          type: boolean
          title: Truncated
          default: false
      type: object
      required:
      - path
      - mime
      - size
      - content
      title: VolumeFileContentResponse
      description: Response for runtime volume file-content preview endpoint.
    VolumeTreeNode:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        path:
          type: string
          title: Path
        type:
          type: string
          enum:
          - volume
          - directory
          - file
          title: Type
        children:
          items:
            $ref: '#/components/schemas/VolumeTreeNode'
          type: array
          title: Children
        size:
          anyOf:
          - type: integer
          - type: 'null'
          title: Size
        modified_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Modified At
      type: object
      required:
      - id
      - name
      - path
      - type
      title: VolumeTreeNode
      description: A single node in the volume file tree.
    VolumeTreeResponse:
      properties:
        volume_name:
          type: string
          title: Volume Name
        root_path:
          type: string
          title: Root Path
        nodes:
          items:
            $ref: '#/components/schemas/VolumeTreeNode'
          type: array
          title: Nodes
        total_files:
          type: integer
          title: Total Files
          default: 0
        total_dirs:
          type: integer
          title: Total Dirs
          default: 0
        truncated:
          type: boolean
          title: Truncated
          default: false
      type: object
      required:
      - volume_name
      - root_path
      - nodes
      title: VolumeTreeResponse
      description: Response for the volume tree listing endpoint.
