          type: string
          title: Skill Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Skill Analytics Api V1 Analytics Skills  Skill
                  Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/search:
    get:
      tags:
      - search
      summary: Search
      operationId: search_api_v1_search_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Search Api V1 Search Get
  /api/v1/memory:
    get:
      tags:
      - memory
      summary: List Memory
      operationId: list_memory_api_v1_memory_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response List Memory Api V1 Memory Get
    post:
      tags:
      - memory
      summary: Create Memory Item
      operationId: create_memory_item_api_v1_memory_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Create Memory Item Api V1 Memory Post
  /api/v1/runtime/settings:
    get:
      tags:
      - runtime
      summary: Get Runtime Settings
      operationId: get_runtime_settings_api_v1_runtime_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSettingsSnapshot'
    patch:
      tags:
      - runtime
      summary: Patch Runtime Settings
      operationId: patch_runtime_settings_api_v1_runtime_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeSettingsUpdateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSettingsUpdateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runtime/tests/modal:
    post:
      tags:
      - runtime
      summary: Test Modal Connection
      operationId: test_modal_connection_api_v1_runtime_tests_modal_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
  /api/v1/runtime/tests/lm:
    post:
      tags:
      - runtime
      summary: Test Lm Connection
      operationId: test_lm_connection_api_v1_runtime_tests_lm_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeConnectivityTestResponse'
  /api/v1/runtime/status:
    get:
      tags:
