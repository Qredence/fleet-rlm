defaults:
  - _self_

agent:
  max_iters: 10
  # Default to DSPY_LM_MODEL environment variable if set, otherwise fallback to a known model
  # from config/config.yaml (e.g., gemini-3-flash-preview or deepseek-v3.2-maas).
  # We use OC env interpolation to respect user's existing .env setup.
  model: "${oc.env:DSPY_LM_MODEL,gemini-3-flash-preview}"
  temperature: 0.0
  rlm_max_iterations: 30
  guardrail_mode: "off"
  min_substantive_chars: 20

interpreter:
  image: "python:3.13-slim-bookworm"
  timeout: 900
  secrets: ["LITELLM"]
  volume_name: null
  async_execute: true

memory:
  # Limits for core memory blocks (in characters)
  core_memory_limits:
    persona: 2000
    human: 2000
    scratchpad: 1000
  # Path in the volume for archival memory
  archival_path: "/data/memory"

rlm_settings:
  max_depth: 2
  max_iters: 5
  max_iterations: 30
  max_llm_calls: 50
  max_output_chars: 10000
  stdout_summary_threshold: 10000
  stdout_summary_prefix_len: 200
  verbose: True

analytics:
  posthog:
    enabled: ${oc.env:POSTHOG_ENABLED,false}
    api_key: ${oc.env:POSTHOG_API_KEY,null}
    host: ${oc.env:POSTHOG_HOST,https://us.i.posthog.com}
    flush_interval: ${oc.env:POSTHOG_FLUSH_INTERVAL,10.0}
    flush_at: ${oc.env:POSTHOG_FLUSH_AT,10}
    enable_dspy_optimization: ${oc.env:POSTHOG_ENABLE_DSPY_OPTIMIZATION,false}
    input_truncation_chars: ${oc.env:POSTHOG_INPUT_TRUNCATION,10000}
    output_truncation_chars: ${oc.env:POSTHOG_OUTPUT_TRUNCATION,5000}
    redact_sensitive: ${oc.env:POSTHOG_REDACT_SENSITIVE,true}
